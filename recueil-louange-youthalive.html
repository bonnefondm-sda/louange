<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YouthAlive — Soirée Louange</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --deep-navy: #0d1b3e;
    --royal-blue: #1a3a7c;
    --violet: #4a2080;
    --gold: #d4a017;
    --gold-light: #f0c842;
    --cream: #fdf6e3;
    --cream-dark: #f0e6c8;
    --text-dark: #1a0f00;
    --text-mid: #3d2b00;
    --shadow: rgba(0,0,0,0.5);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--deep-navy);
    font-family: 'Crimson Pro', Georgia, serif;
    touch-action: pan-y;
  }

  /* Background stars */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(74,32,128,0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(26,58,124,0.5) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 50%, rgba(13,27,62,1) 0%, transparent 100%);
    z-index: 0;
  }

  /* Subtle stars */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 90%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 45% 55%, rgba(212,160,23,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 85% 20%, rgba(212,160,23,0.3) 0%, transparent 100%);
    z-index: 0;
  }

  /* ===== HEADER ===== */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 10px 16px 6px;
    text-align: center;
    background: linear-gradient(to bottom, rgba(13,27,62,0.98) 70%, transparent);
  }

  .brand-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 2px;
  }

  .flame-icon {
    width: 28px;
    height: 28px;
  }

  .brand-title {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(212,160,23,0.6);
  }

  .brand-subtitle {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.4em;
    color: rgba(212,160,23,0.6);
    text-transform: uppercase;
  }

  .event-title {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  /* ===== BOOK CONTAINER ===== */
  #book-wrapper {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 8px 70px;
  }

  #book {
    position: relative;
    width: 100%;
    max-width: 480px;
    height: 100%;
    perspective: 1200px;
  }

  /* ===== PAGE ===== */
  .page {
    position: absolute;
    inset: 0;
    border-radius: 4px 12px 12px 4px;
    overflow: hidden;
    transform-origin: left center;
    transition: transform 0.6s cubic-bezier(0.645, 0.045, 0.355, 1.000),
                box-shadow 0.6s ease,
                opacity 0.3s ease;
    will-change: transform;
    backface-visibility: hidden;
  }

  .page.active {
    transform: rotateY(0deg);
    opacity: 1;
    z-index: 5;
    box-shadow:
      4px 0 20px rgba(0,0,0,0.6),
      inset -2px 0 8px rgba(0,0,0,0.2);
  }

  .page.prev {
    transform: rotateY(-180deg);
    opacity: 0;
    z-index: 4;
  }

  .page.next {
    transform: rotateY(0deg);
    opacity: 0;
    z-index: 3;
  }

  .page.flipping-out {
    transform: rotateY(-180deg);
    opacity: 0;
    z-index: 6;
  }

  .page.flipping-in {
    transform: rotateY(0deg);
    opacity: 1;
    z-index: 5;
  }

  /* ===== PAGE CONTENT ===== */
  .page-inner {
    width: 100%;
    height: 100%;
    background:
      linear-gradient(135deg, var(--cream) 0%, var(--cream-dark) 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Paper texture lines */
  .page-inner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 27px,
      rgba(180,150,100,0.12) 27px,
      rgba(180,150,100,0.12) 28px
    );
    pointer-events: none;
    z-index: 0;
  }

  /* Left binding shadow */
  .page-inner::after {
    content: '';
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 18px;
    background: linear-gradient(to right, rgba(0,0,0,0.12), transparent);
    pointer-events: none;
    z-index: 2;
  }

  /* ===== COVER PAGE ===== */
  .cover .page-inner {
    background: linear-gradient(160deg, #1a3a7c 0%, #0d1b3e 40%, #2a0a5e 100%);
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 0;
  }

  .cover .page-inner::before {
    background-image: none;
    background: radial-gradient(ellipse at 50% 30%, rgba(212,160,23,0.15) 0%, transparent 70%);
  }

  .cover .page-inner::after { display: none; }

  .cover-ornament {
    font-size: 3.5rem;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 20px rgba(212,160,23,0.8));
    animation: pulse-glow 3s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { filter: drop-shadow(0 0 15px rgba(212,160,23,0.6)); }
    50% { filter: drop-shadow(0 0 30px rgba(212,160,23,1)); }
  }

  .cover-brand {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.5em;
    color: var(--gold);
    margin-bottom: 20px;
    text-transform: uppercase;
    opacity: 0.8;
  }

  .cover-main-title {
    font-family: 'Cinzel', serif;
    font-size: 2rem;
    font-weight: 900;
    color: #fff;
    line-height: 1.1;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    margin-bottom: 8px;
  }

  .cover-title-gold {
    color: var(--gold-light);
    display: block;
  }

  .cover-divider {
    width: 80px;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 16px auto;
  }

  .cover-verse {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.65);
    max-width: 220px;
    line-height: 1.5;
    margin: 0 auto;
    padding: 0 20px;
  }

  .cover-verse cite {
    display: block;
    font-style: normal;
    color: var(--gold);
    font-size: 0.7rem;
    margin-top: 6px;
    letter-spacing: 0.1em;
  }

  .cover-song-count {
    position: absolute;
    bottom: 24px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: rgba(212,160,23,0.5);
  }

  .cover-decoration {
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    border: 1px solid rgba(212,160,23,0.1);
    top: -50px; right: -50px;
  }

  .cover-decoration:nth-child(2) {
    width: 300px; height: 300px;
    border-color: rgba(212,160,23,0.06);
    top: -100px; right: -100px;
  }

  /* ===== MEDLEY PAGE ===== */
  .medley-header .page-inner {
    background: linear-gradient(160deg, #2a0a5e 0%, #1a3a7c 100%);
  }

  .medley-header .page-inner::before { background-image: none; }
  .medley-header .page-inner::after { display: none; }

  .medley-inner {
    padding: 28px 24px 20px;
    display: flex;
    flex-direction: column;
    height: 100%;
    color: #fff;
  }

  .medley-badge {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 0.5rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    border: 1px solid rgba(212,160,23,0.4);
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  .medley-title {
    font-family: 'Cinzel', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--gold-light);
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .medley-songs-list {
    list-style: none;
    padding: 0;
  }

  .medley-songs-list li {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: rgba(255,255,255,0.75);
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .medley-songs-list li::before {
    content: '♪ ';
    color: var(--gold);
  }

  /* ===== SONG PAGE ===== */
  .song-page .page-inner {
    display: flex;
    flex-direction: column;
  }

  .page-header {
    padding: 16px 20px 8px 24px;
    border-bottom: 1px solid rgba(180,150,100,0.3);
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }

  .song-number {
    font-family: 'Cinzel', serif;
    font-size: 0.5rem;
    letter-spacing: 0.3em;
    color: rgba(100,70,20,0.5);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .song-title {
    font-family: 'Cinzel', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text-dark);
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .song-meta {
    font-family: 'Crimson Pro', serif;
    font-size: 0.72rem;
    color: rgba(100,70,20,0.6);
    font-style: italic;
  }

  .gold-line {
    height: 2px;
    background: linear-gradient(to right, var(--gold), transparent);
    margin-top: 8px;
    width: 60px;
  }

  /* ===== LYRICS ===== */
  .lyrics-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px 20px 24px;
    position: relative;
    z-index: 1;
    -webkit-overflow-scrolling: touch;
  }

  .lyrics-scroll::-webkit-scrollbar { width: 4px; }
  .lyrics-scroll::-webkit-scrollbar-track { background: transparent; }
  .lyrics-scroll::-webkit-scrollbar-thumb { background: rgba(180,150,100,0.4); border-radius: 2px; }

  .lyric-section {
    margin-bottom: 14px;
  }

  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 0.52rem;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, rgba(212,160,23,0.3), transparent);
  }

  .lyric-lines {
    font-family: 'Crimson Pro', serif;
    font-size: 1.02rem;
    line-height: 1.65;
    color: var(--text-dark);
  }

  .lyric-lines.refrain {
    font-weight: 600;
    font-style: italic;
    color: var(--royal-blue);
  }

  .lyric-lines.pont {
    font-style: italic;
    color: var(--violet);
  }



  /* ===== FOOTER NAV ===== */
  #footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    padding: 8px 16px 12px;
    background: linear-gradient(to top, rgba(13,27,62,0.98) 70%, transparent);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-btn {
    background: none;
    border: 1px solid rgba(212,160,23,0.4);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    min-width: 80px;
  }

  .nav-btn:active {
    background: rgba(212,160,23,0.2);
    transform: scale(0.96);
  }

  .nav-btn:disabled {
    opacity: 0.2;
    cursor: not-allowed;
  }

  .page-indicator {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .dots {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(212,160,23,0.25);
    transition: all 0.3s;
  }

  .dot.active {
    width: 18px;
    border-radius: 3px;
    background: var(--gold);
  }

  .page-label {
    font-family: 'Crimson Pro', serif;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.05em;
  }

  /* ===== SWIPE HINT ===== */
  .swipe-hint {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Crimson Pro', serif;
    font-size: 0.7rem;
    font-style: italic;
    color: rgba(255,255,255,0.3);
    z-index: 50;
    animation: fade-hint 4s ease forwards;
    white-space: nowrap;
  }

  @keyframes fade-hint {
    0%, 60% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ===== INDEX PAGE ===== */
  .index-page .page-inner {
    background: linear-gradient(160deg, var(--cream) 0%, var(--cream-dark) 100%);
  }

  .index-header {
    padding: 20px 20px 10px 24px;
    border-bottom: 1px solid rgba(180,150,100,0.3);
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }

  .index-title {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-dark);
  }

  .index-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 16px 20px 24px;
    position: relative;
    z-index: 1;
    -webkit-overflow-scrolling: touch;
  }

  .index-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(180,150,100,0.15);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .index-item:active .index-song-name {
    color: var(--royal-blue);
  }

  .index-num {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    color: var(--gold);
    min-width: 18px;
    text-align: right;
    flex-shrink: 0;
  }

  .index-dots-line {
    flex: 1;
    border-bottom: 1px dotted rgba(180,150,100,0.35);
    margin-bottom: 3px;
  }

  .index-song-name {
    font-family: 'Crimson Pro', serif;
    font-size: 0.9rem;
    color: var(--text-dark);
    line-height: 1.3;
  }

  .index-tag {
    font-size: 0.65rem;
    color: rgba(100,70,20,0.45);
    font-style: italic;
    white-space: nowrap;
  }

  /* Transition overlay */
  #page-turn-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
    background: linear-gradient(to right, rgba(212,160,23,0.08), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  #page-turn-overlay.flash { opacity: 1; }
</style>
</head>
<body>

<div id="header">
  <div class="brand-logo">
    <svg class="flame-icon" viewBox="0 0 24 30" fill="none">
      <path d="M12 2C12 2 7 8 7 14C7 17.3 9.2 20 12 20C14.8 20 17 17.3 17 14C17 8 12 2 12 2Z" fill="#d4a017" opacity="0.9"/>
      <path d="M12 8C12 8 9 12 9 15.5C9 17.4 10.3 19 12 19C13.7 19 15 17.4 15 15.5C15 12 12 8 12 8Z" fill="#f0c842"/>
      <path d="M12 13C12 13 10.5 15 10.5 16.5C10.5 17.3 11.2 18 12 18C12.8 18 13.5 17.3 13.5 16.5C13.5 15 12 13 12 13Z" fill="white" opacity="0.8"/>
    </svg>
    <span class="brand-title">YOUTH ALIVE</span>
    <svg class="flame-icon" viewBox="0 0 24 30" fill="none" style="transform:scaleX(-1)">
      <path d="M12 2C12 2 7 8 7 14C7 17.3 9.2 20 12 20C14.8 20 17 17.3 17 14C17 8 12 2 12 2Z" fill="#d4a017" opacity="0.9"/>
      <path d="M12 8C12 8 9 12 9 15.5C9 17.4 10.3 19 12 19C13.7 19 15 17.4 15 15.5C15 12 12 8 12 8Z" fill="#f0c842"/>
    </svg>
  </div>
  <div class="brand-subtitle">Jeunesse Adventiste</div>
  <div class="event-title">Soirée de Louange — Recueil de Chants</div>
</div>

<div id="book-wrapper">
  <div id="book"></div>
</div>

<div id="footer">
  <button class="nav-btn" id="prevBtn" onclick="turnPage(-1)" disabled>◂ Préc.</button>
  <div class="page-indicator">
    <div class="dots" id="dots"></div>
    <div class="page-label" id="pageLabel">Couverture</div>
  </div>
  <button class="nav-btn" id="nextBtn" onclick="turnPage(1)">Suiv. ▸</button>
</div>

<div id="page-turn-overlay"></div>
<div class="swipe-hint" id="swipeHint">← Glissez pour tourner les pages →</div>

<script>
const pages = [];

// =====================
// DATA
// =====================
const songs = [
  {
    title: "Viens, ne tarde plus",
    ref: "JEM720 · Brian Doerksen · Sib",
    sections: [
      { type: "refrain", label: "Refrain", lines: "Viens, ne tarde plus, adore.\nViens, ne tarde plus, donne ton cœur.\nViens tel que tu es, adore.\nViens tel que tu es devant ton Dieu. Viens." },
      { type: "strophe", label: "Strophe", lines: "Un jour, toute langue dira : « Tu es Dieu. »\nUn jour, tout genou fléchira.\nMais le vrai trésor est pour ceux\nQui t'ont choisi dès aujourd'hui." },
    ]
  },
  {
    title: "Venez le célébrer",
    ref: "JEM516 · Patricia Morgan · FA",
    sections: [
      { type: "strophe", label: "Strophe", lines: "Venez le célébrer,\nSon grand amour, venez le chanter ;\nLe Fils de Dieu est venu donner la vie.\nNous te fêtons, ô Roi,\nCar tu nous fais partager ta joie,\nEt nous offrons, en ton honneur,\nUn chant d'amour, Seigneur." },
      { type: "refrain", label: "Refrain", lines: "Venez le célébrer, célébrer,\nCélébrer, chanter,\nCélébrer, chanter notre Roi.\nVenez le célébrer, célébrer,\nCélébrer, chanter,\nCélébrer, chanter notre Roi." },
    ]
  },
  {
    title: "Quand je contemple",
    ref: "Maggie Blanchard",
    sections: [
      { type: "strophe", label: "Strophe", lines: "Quand je regarde ta sainteté\nEt quand je contemple ta beauté\nLes choses qui m'entourent\nNe valent plus rien pour moi\nJe découvre la joie de te chanter\nDe déposer ma vie à tes pieds\nIl n'y a que toi qui importe pour moi" },
      { type: "refrain", label: "Refrain", lines: "Je veux t'adorer, oui t'adorer ×2\nMa raison de vivre c'est de t'adorer\nJe veux t'adorer, oui t'adorer" },
      { type: "pont", label: "Pont", lines: "C'est la raison pour laquelle je vis ×2\nPour t'adorer mon Dieu" },
    ]
  },
  {
    title: "Oh ! Jésus, mon Sauveur",
    ref: "JEM640 · Darlene Zschech",
    sections: [
      { type: "strophe", label: "Strophe", lines: "Oh ! Jésus, mon Sauveur,\nSeigneur, nul n'est comme toi.\nJour après jour, je te louerai,\nCar ton amour est merveilleux.\nMon abri, mon refuge,\nMon réconfort, mon rocher\nTout ce qui vit, ce que je suis,\nNe cesse de t'adorer." },
      { type: "refrain", label: "Refrain", lines: "Chante au Seigneur,\nCrie de joie terre entière.\nÀ Dieu la gloire, la puissance et l'honneur.\nLes monts s'inclinent et les flots rugissent\nÀ l'écho de ton nom.\nJe vois tes œuvres\nEt mon cœur crie de joie ;\nJe t'aimerai, je tiendrai par la foi.\nRien ne pourrait égaler\nTes promesses pour moi." },
    ]
  },
  {
    title: "Combien Dieu est grand",
    ref: "Sib",

const medleys = [
  { pageIndex: 1, title: "Médley d'ouverture", songs: ["Viens, ne tarde plus", "Venez le célébrer"] },
  { pageIndex: 4, title: "Médley", songs: ["Combien Dieu est grand", "Quand je contemple", "Oh ! Jésus mon Sauveur"] },
  { pageIndex: 8, title: "Médley", songs: ["Christ est Roi", "Je n'ai que toi"] },
  { pageIndex: 12, title: "Médley", songs: ["Je continuerai", "Comme un phare", "Ouvre les yeux de mon cœur"] },
  { pageIndex: 16, title: "Médley final", songs: ["Je veux n'être qu'à toi", "Emmanuel"] }
];

// Build page list
const pageList = [];

// Cover
pageList.push({ type: 'cover' });

// Index
pageList.push({ type: 'index' });

// Songs
songs.forEach((song, i) => {
  pageList.push({ type: 'song', song, num: i + 1 });
});

let currentPage = 0;
let isAnimating = false;

// =====================
// RENDER
// =====================
function buildPages() {
  const book = document.getElementById('book');
  book.innerHTML = '';

  pageList.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'page';
    el.dataset.index = i;

    if (p.type === 'cover') {
      el.classList.add('cover');
      el.innerHTML = `<div class="page-inner">
        <div class="cover-decoration"></div>
        <div class="cover-decoration"></div>
        <div class="cover-ornament">🕊️</div>
        <div class="cover-brand">Youth Alive · Jeunesse Adventiste</div>
        <h1 class="cover-main-title">Soirée de<span class="cover-title-gold">Louange</span></h1>
        <div class="cover-divider"></div>
        <p class="cover-verse">
          « Chantez à l'Éternel un cantique nouveau, chantez à l'Éternel, vous tous, habitants de la terre ! »
          <cite>Psaume 96:1</cite>
        </p>
        <div class="cover-song-count">${songs.length} chants · Gloire à Dieu</div>
      </div>`;
    } else if (p.type === 'index') {
      el.classList.add('index-page');
      let items = songs.map((s, idx) => `
        <div class="index-item" onclick="goToSong(${idx + 2})">
          <span class="index-num">${idx + 1}</span>
          <div class="index-dots-line"></div>
          <div>
            <div class="index-song-name">${s.title}</div>
            <div class="index-tag">${s.ref}</div>
          </div>
        </div>`).join('');
      el.innerHTML = `<div class="page-inner">
        <div class="index-header">
          <div class="gold-line" style="margin-bottom:6px"></div>
          <div class="index-title">Table des matières</div>
        </div>
        <div class="index-list">${items}</div>
      </div>`;
    } else {
      el.classList.add('song-page');
      const s = p.song;
      const sectionsHTML = s.sections.map(sec => {
        const linesClean = sec.lines
          .replace(/ ?×\d+/g, '')
          .split('\n').join('<br>');
        let cls = 'lyric-lines';
        if (sec.type === 'refrain') cls += ' refrain';
        if (sec.type === 'pont') cls += ' pont';
        return `<div class="lyric-section">
          <div class="section-label">${sec.label.replace(/ ?×\d+/g, '')}</div>
          <div class="${cls}">${linesClean}</div>
        </div>`;
      }).join('');

      el.innerHTML = `<div class="page-inner">
        <div class="page-header">
          <div class="song-number">Chant ${p.num} / ${songs.length}</div>
          <div class="song-title">${s.title}</div>
          <div class="song-meta">${s.ref}</div>
          <div class="gold-line"></div>
        </div>
        <div class="lyrics-scroll">${sectionsHTML}</div>
      </div>`;
    }

    book.appendChild(el);
    pages.push(el);
  });

  renderPage();
  buildDots();
}

function buildDots() {
  const container = document.getElementById('dots');
  container.innerHTML = '';
  const total = Math.min(pageList.length, 9);
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    container.appendChild(d);
  }
}

function renderPage() {
  pages.forEach((el, i) => {
    el.className = 'page';
    if (i === currentPage) {
      if (pageList[i].type === 'cover') el.classList.add('cover');
      else if (pageList[i].type === 'index') el.classList.add('index-page');
      else el.classList.add('song-page');
      el.classList.add('active');
    } else {
      el.style.display = 'none';
    }
  });

  // Show next page behind for visual depth
  if (currentPage + 1 < pages.length) {
    pages[currentPage + 1].style.display = '';
    pages[currentPage + 1].classList.add('next');
  }

  // Show/hide pages
  pages.forEach((el, i) => {
    if (i !== currentPage && i !== currentPage + 1) {
      el.style.display = 'none';
    } else {
      el.style.display = '';
    }
  });

  updateNav();
  updateDots();
  updateLabel();
}

function updateNav() {
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage === pageList.length - 1;
}

function updateDots() {
  const dots = document.querySelectorAll('.dot');
  const total = pageList.length;
  const dotCount = dots.length;

  let startPage = Math.max(0, currentPage - Math.floor(dotCount / 2));
  startPage = Math.min(startPage, total - dotCount);
  startPage = Math.max(0, startPage);

  dots.forEach((d, i) => {
    d.classList.toggle('active', startPage + i === currentPage);
  });
}

function updateLabel() {
  const p = pageList[currentPage];
  let label = '';
  if (p.type === 'cover') label = 'Couverture';
  else if (p.type === 'index') label = 'Sommaire';
  else label = `${p.song.title}`;
  document.getElementById('pageLabel').textContent = label;
}

function goToSong(index) {
  if (index >= 0 && index < pageList.length) {
    currentPage = index;
    renderPage();
    flashOverlay();
  }
}

function turnPage(dir) {
  if (isAnimating) return;
  const next = currentPage + dir;
  if (next < 0 || next >= pageList.length) return;

  isAnimating = true;
  flashOverlay();

  const current = pages[currentPage];
  const target = pages[next];

  // Show target
  target.style.display = '';
  target.className = 'page';
  if (pageList[next].type === 'cover') target.classList.add('cover');
  else if (pageList[next].type === 'index') target.classList.add('index-page');
  else target.classList.add('song-page');

  if (dir > 0) {
    // Forward: current flips left, target appears
    current.style.transition = 'transform 0.5s cubic-bezier(0.645, 0.045, 0.355, 1), opacity 0.5s';
    current.style.transform = 'rotateY(-15deg) translateX(-5%)';
    current.style.opacity = '0.7';
    target.style.transform = 'translateX(15px)';
    target.style.opacity = '0';
    target.style.transition = 'none';

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        target.style.transition = 'transform 0.5s cubic-bezier(0.645, 0.045, 0.355, 1), opacity 0.5s';
        target.style.transform = 'translateX(0)';
        target.style.opacity = '1';
      });
    });
  } else {
    // Backward
    current.style.transition = 'transform 0.4s ease, opacity 0.4s';
    current.style.transform = 'translateX(20px)';
    current.style.opacity = '0';
    target.style.opacity = '0';
    target.style.transform = 'translateX(-10px)';
    target.style.transition = 'none';

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        target.style.transition = 'transform 0.4s ease, opacity 0.4s';
        target.style.transform = 'translateX(0)';
        target.style.opacity = '1';
      });
    });
  }

  setTimeout(() => {
    current.style.display = 'none';
    current.style.transform = '';
    current.style.opacity = '';
    current.style.transition = '';
    target.style.transform = '';
    target.style.opacity = '';
    target.style.transition = '';
    currentPage = next;
    renderPage();
    isAnimating = false;
  }, 520);
}

function flashOverlay() {
  const overlay = document.getElementById('page-turn-overlay');
  overlay.classList.add('flash');
  setTimeout(() => overlay.classList.remove('flash'), 300);
}

// =====================
// SWIPE
// =====================
let touchStartX = 0;
let touchStartY = 0;

document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    turnPage(dx < 0 ? 1 : -1);
  }
}, { passive: true });

// keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') turnPage(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') turnPage(-1);
});

// Hide hint after 4s
setTimeout(() => {
  const h = document.getElementById('swipeHint');
  if (h) h.remove();
}, 4500);

buildPages();
</script>
