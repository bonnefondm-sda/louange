<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YouthAlive — Soirée Louange</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #ede8e3;
    --page-bg:   #faf8f5;
    --page-bg2:  #f4efe9;
    --cover-bg:  #e6dff0;
    --cover-bg2: #d8ceea;
    --accent:    #7a5fa8;
    --soft-blue: #5c7ea8;
    --muted:     #9e8fa8;
    --text:      #2a2233;
    --text-mid:  #544868;
    --text-light:#8a7d96;
    --divider:   rgba(122,95,168,0.18);
    --shadow:    rgba(80,60,110,0.10);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    touch-action: pan-y;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 10% 0%, rgba(210,195,235,0.55) 0%, transparent 55%),
      radial-gradient(ellipse at 90% 100%, rgba(190,210,235,0.35) 0%, transparent 50%);
    z-index: 0; pointer-events: none;
  }

  /* ===== HEADER ===== */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 10px 20px 7px;
    text-align: center;
    background: rgba(237,232,227,0.96);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--divider);
  }

  .brand-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
  }

  .brand-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0.55; }

  .brand-title {
    font-family: 'Nunito', sans-serif;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .event-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.8rem;
    color: var(--text-light);
    margin-top: 1px;
  }

  /* ===== BOOK ===== */
  #book-wrapper {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    padding: 66px 14px 62px;
  }

  #book { position: relative; width: 100%; max-width: 460px; height: 100%; }

  /* ===== PAGE ===== */
  .page {
    position: absolute; inset: 0;
    border-radius: 3px 16px 16px 3px;
    overflow: hidden;
    box-shadow: 2px 3px 10px var(--shadow), 6px 6px 28px var(--shadow);
  }

  .page-inner {
    width: 100%; height: 100%;
    background: var(--page-bg);
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }

  /* Left binding */
  .page-inner::after {
    content: ''; position: absolute;
    top: 0; left: 0; bottom: 0; width: 5px;
    background: linear-gradient(to right, rgba(122,95,168,0.12), transparent);
    pointer-events: none; z-index: 2;
  }

  /* ===== COVER ===== */
  .cover .page-inner {
    background: linear-gradient(150deg, var(--cover-bg) 0%, var(--cover-bg2) 100%);
    align-items: center; justify-content: center; text-align: center;
  }
  .cover .page-inner::after { display: none; }

  .cover-circle {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(122,95,168,0.12); pointer-events: none;
  }

  .cover-ornament { font-size: 2.8rem; margin-bottom: 14px; opacity: 0.9; }

  .cover-brand {
    font-family: 'Nunito', sans-serif;
    font-size: 0.58rem; font-weight: 700;
    letter-spacing: 0.38em; color: var(--accent);
    text-transform: uppercase; opacity: 0.75; margin-bottom: 16px;
  }

  .cover-main-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem; font-weight: 300;
    color: var(--text); line-height: 1.05; margin-bottom: 4px;
  }

  .cover-title-accent { display: block; color: var(--accent); font-weight: 600; }

  .cover-divider { width: 44px; height: 1px; background: var(--accent); opacity: 0.3; margin: 16px auto; }

  .cover-verse {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 0.88rem;
    color: var(--text-mid); max-width: 210px;
    line-height: 1.65; margin: 0 auto; padding: 0 16px;
  }

  .cover-verse cite {
    display: block; font-style: normal;
    font-size: 0.65rem; color: var(--accent);
    margin-top: 8px; letter-spacing: 0.08em;
    font-family: 'Nunito', sans-serif; font-weight: 600;
  }

  .cover-count {
    position: absolute; bottom: 20px; left: 0; right: 0;
    text-align: center; font-family: 'Nunito', sans-serif;
    font-size: 0.56rem; letter-spacing: 0.22em; color: var(--muted); text-transform: uppercase;
  }

  /* ===== INDEX ===== */
  .index-header {
    padding: 18px 20px 12px 20px;
    border-bottom: 1px solid var(--divider);
    flex-shrink: 0; position: relative; z-index: 1;
  }

  .eyebrow {
    font-family: 'Nunito', sans-serif;
    font-size: 0.5rem; font-weight: 700;
    letter-spacing: 0.3em; color: var(--accent);
    text-transform: uppercase; margin-bottom: 4px; opacity: 0.8;
  }

  .index-main-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem; font-weight: 600; color: var(--text);
  }

  .index-list {
    flex: 1; overflow-y: auto;
    padding: 6px 20px 20px;
    position: relative; z-index: 1;
    -webkit-overflow-scrolling: touch;
  }

  .index-list::-webkit-scrollbar { width: 3px; }
  .index-list::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 2px; }

  .index-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 6px;
    border-bottom: 1px solid rgba(122,95,168,0.07);
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: background 0.15s; border-radius: 6px; margin: 1px 0;
  }

  .index-item:active { background: rgba(122,95,168,0.07); }

  .index-num {
    font-family: 'Nunito', sans-serif; font-size: 0.6rem; font-weight: 700;
    color: var(--accent); min-width: 18px; text-align: right; flex-shrink: 0; opacity: 0.75;
  }

  .index-song-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.02rem; color: var(--text); line-height: 1.2; flex: 1;
  }

  .index-ref { font-family: 'Nunito', sans-serif; font-size: 0.56rem; color: var(--text-light); white-space: nowrap; }

  /* ===== SONG PAGE ===== */
  .song-page .page-inner { background: linear-gradient(150deg, var(--page-bg) 0%, var(--page-bg2) 100%); }

  .page-header {
    padding: 16px 20px 10px 20px;
    flex-shrink: 0; position: relative; z-index: 1;
    border-bottom: 1px solid var(--divider);
  }

  .song-counter {
    font-family: 'Nunito', sans-serif; font-size: 0.5rem; font-weight: 700;
    letter-spacing: 0.22em; color: var(--accent); text-transform: uppercase;
    margin-bottom: 4px; opacity: 0.65;
  }

  .song-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem; font-weight: 600; color: var(--text);
    line-height: 1.15; margin-bottom: 3px;
  }

  .song-meta { font-family: 'Nunito', sans-serif; font-size: 0.6rem; color: var(--text-light); }

  /* ===== LYRICS ===== */
  .lyrics-scroll {
    flex: 1; overflow-y: auto;
    padding: 14px 20px 22px;
    position: relative; z-index: 1;
    -webkit-overflow-scrolling: touch;
  }

  .lyrics-scroll::-webkit-scrollbar { width: 3px; }
  .lyrics-scroll::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 2px; }

  .lyric-section { margin-bottom: 18px; }

  .section-label {
    font-family: 'Nunito', sans-serif; font-size: 0.5rem; font-weight: 700;
    letter-spacing: 0.22em; color: var(--accent); text-transform: uppercase;
    margin-bottom: 6px; opacity: 0.65;
  }

  .lyric-lines {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem; line-height: 1.72; color: var(--text);
  }

  .lyric-lines.refrain { font-style: italic; font-weight: 600; color: var(--accent); }
  .lyric-lines.pont    { font-style: italic; color: var(--soft-blue); }

  /* ===== FOOTER ===== */
  #footer {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    padding: 8px 20px 12px;
    background: rgba(237,232,227,0.96);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--divider);
    display: flex; align-items: center; justify-content: space-between;
  }

  .nav-btn {
    background: none; border: 1px solid var(--divider); color: var(--text-mid);
    font-family: 'Nunito', sans-serif; font-size: 0.68rem; font-weight: 600;
    padding: 7px 18px; border-radius: 20px; cursor: pointer;
    transition: all 0.15s; -webkit-tap-highlight-color: transparent; min-width: 78px;
  }

  .nav-btn:active { background: var(--divider); transform: scale(0.96); }
  .nav-btn:disabled { opacity: 0.2; cursor: default; }

  .page-indicator { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .dots { display: flex; gap: 5px; align-items: center; }

  .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(122,95,168,0.2); transition: all 0.25s; }
  .dot.active { width: 16px; border-radius: 3px; background: var(--accent); }

  .page-label {
    font-family: 'Nunito', sans-serif; font-size: 0.58rem; color: var(--text-light);
    max-width: 160px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .swipe-hint {
    position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%);
    font-size: 0.63rem; color: var(--muted); z-index: 50;
    animation: fade-hint 4s ease forwards; white-space: nowrap; pointer-events: none;
  }

  @keyframes fade-hint { 0%, 55% { opacity: 1; } 100% { opacity: 0; } }

  #overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 200;
    background: rgba(255,255,255,0.22); opacity: 0; transition: opacity 0.22s;
  }
  #overlay.flash { opacity: 1; }
</style>
</head>
<body>

<div id="header">
  <div class="brand-row">
    <div class="brand-dot"></div>
    <span class="brand-title">Youth Alive · Jeunesse Adventiste</span>
    <div class="brand-dot"></div>
  </div>
  <div class="event-label">Soirée de Louange — Recueil de chants</div>
</div>

<div id="book-wrapper"><div id="book"></div></div>

<div id="footer">
  <button class="nav-btn" id="prevBtn" onclick="turnPage(-1)" disabled>← Préc.</button>
  <div class="page-indicator">
    <div class="dots" id="dots"></div>
    <div class="page-label" id="pageLabel">Couverture</div>
  </div>
  <button class="nav-btn" id="nextBtn" onclick="turnPage(1)">Suiv. →</button>
</div>

<div id="overlay"></div>
<div class="swipe-hint" id="swipeHint">← Glissez pour tourner les pages →</div>

<script>
const songs = [
  { title: "Viens, ne tarde plus", ref: "JEM720 · Brian Doerksen", sections: [
    { type:"refrain", label:"Refrain", lines:"Viens, ne tarde plus, adore.\nViens, ne tarde plus, donne ton cœur.\nViens tel que tu es, adore.\nViens tel que tu es devant ton Dieu. Viens." },
    { type:"strophe", label:"Strophe", lines:"Un jour, toute langue dira : « Tu es Dieu. »\nUn jour, tout genou fléchira.\nMais le vrai trésor est pour ceux\nQui t'ont choisi dès aujourd'hui." }
  ]},
  { title: "Venez le célébrer", ref: "JEM516 · Patricia Morgan", sections: [
    { type:"strophe", label:"Strophe", lines:"Venez le célébrer,\nSon grand amour, venez le chanter ;\nLe Fils de Dieu est venu donner la vie.\nNous te fêtons, ô Roi,\nCar tu nous fais partager ta joie,\nEt nous offrons, en ton honneur,\nUn chant d'amour, Seigneur." },
    { type:"refrain", label:"Refrain", lines:"Venez le célébrer, célébrer,\nCélébrer, chanter,\nCélébrer, chanter notre Roi.\nVenez le célébrer, célébrer,\nCélébrer, chanter,\nCélébrer, chanter notre Roi." }
  ]},
  { title: "Quand je contemple", ref: "Maggie Blanchard", sections: [
    { type:"strophe", label:"Strophe", lines:"Quand je regarde ta sainteté\nEt quand je contemple ta beauté,\nLes choses qui m'entourent\nNe valent plus rien pour moi.\nJe découvre la joie de te chanter,\nDe déposer ma vie à tes pieds.\nIl n'y a que toi qui importe pour moi." },
    { type:"refrain", label:"Refrain", lines:"Je veux t'adorer, oui t'adorer.\nMa raison de vivre, c'est de t'adorer.\nJe veux t'adorer, oui t'adorer." },
    { type:"pont", label:"Pont", lines:"C'est la raison pour laquelle je vis,\nPour t'adorer, mon Dieu." }
  ]},
  { title: "Oh ! Jésus, mon Sauveur", ref: "JEM640 · Darlene Zschech", sections: [
    { type:"strophe", label:"Strophe", lines:"Oh ! Jésus, mon Sauveur,\nSeigneur, nul n'est comme toi.\nJour après jour, je te louerai,\nCar ton amour est merveilleux.\nMon abri, mon refuge,\nMon réconfort, mon rocher,\nTout ce qui vit, ce que je suis,\nNe cesse de t'adorer." },
    { type:"refrain", label:"Refrain", lines:"Chante au Seigneur,\nCrie de joie, terre entière.\nÀ Dieu la gloire, la puissance et l'honneur.\nLes monts s'inclinent et les flots rugissent\nÀ l'écho de ton nom.\nJe vois tes œuvres\nEt mon cœur crie de joie ;\nJe t'aimerai, je tiendrai par la foi.\nRien ne pourrait égaler\nTes promesses pour moi." }
  ]},
  { title: "Combien Dieu est grand", ref: "JEM870", sections: [
    { type:"strophe", label:"Strophe 1", lines:"Le Roi dans sa beauté,\nVêtu de majesté,\nLa terre est dans la joie.\nSa gloire resplendit,\nL'obscurité s'enfuit\nAu son de sa voix." },
    { type:"refrain", label:"Refrain", lines:"Combien Dieu est grand !\nChantons-le !\nCombien Dieu est grand,\nEt tous verront combien,\nCombien Dieu est grand !" },
    { type:"strophe", label:"Strophe 2", lines:"Car d'âge en âge, il vit,\nLe temps lui est soumis,\nCommencement et fin.\nCéleste Trinité,\nDieu d'éternité,\nIl est l'Agneau divin." },
    { type:"pont", label:"Pont", lines:"Son nom est tout-puissant,\nDigne de louanges.\nJe chanterai combien Dieu est grand.\nDe tout mon être alors s'élève un chant :\nDieu tout-puissant, que tu es grand !" }
  ]},
  { title: "Il est exalté", ref: "JEM352 · Twila Paris", sections: [
    { type:"strophe", label:"Strophe A", lines:"Il est exalté,\nLe Roi est au-dessus des cieux.\nJe veux le louer.\nIl est élevé, à jamais exalté,\nEt je loue son saint nom." },
    { type:"strophe", label:"Strophe B", lines:"Il est Seigneur,\nSa vérité régnera,\nTout l'univers\nSe réjouit dans son saint nom.\nIl est exalté,\nLe Roi est au-dessus des cieux." }
  ]},
  { title: "C'est si bon de louer son nom", ref: "Maggie Blanchard", sections: [
    { type:"strophe", label:"Strophe", lines:"C'est si bon de louer son nom,\nDe chanter des louanges,\nGloire à son saint nom,\nDe proclamer sa fidélité\nChaque jour infiniment." },
    { type:"refrain", label:"Refrain", lines:"La, la, la, la, la, la…" }
  ]},
  { title: "Christ est Roi", ref: "JEM3-850 · Richard Picotin", sections: [
    { type:"strophe", label:"Strophe 1", lines:"Dans son amour, Dieu le Père\nEnvoya son Fils Jésus\nPour accorder la lumière\nÀ tous ceux qui sont perdus.\nIl descendit sur la terre,\nMais les hommes l'ont rejeté.\nIls l'ont cloué au Calvaire,\nMais Christ est ressuscité." },
    { type:"refrain", label:"Refrain", lines:"Christ est Roi, Christ est Roi,\nChrist est Roi des rois.\nChrist est Roi, Christ est Roi,\nChrist est Roi des rois." },
    { type:"strophe", label:"Strophe 2", lines:"Les croyants de tous les âges\nPortent son nom sur leur cœur ;\nDans l'épreuve, ils gardent courage\nCar leur Dieu est un sauveur.\nIls vont par toute la terre\nAnnoncer le Fils béni,\nFiers de porter leur bannière\nSur laquelle il est écrit :" },
    { type:"strophe", label:"Strophe 3", lines:"Un jour, les chrétiens du monde\nSeront rassemblés par lui.\nIls sortiront de leurs tombes\nCar, en lui, ils ont la vie.\nIls formeront un royaume,\nLa terre sera leur pays.\nLeur hymne sera un psaume\nÀ la gloire du Messie." }
  ]},
  { title: "Je n'ai que toi", ref: "JEM2-427 · Billy Sprague · David Durham", sections: [
    { type:"strophe", label:"Strophe 1", lines:"Je n'ai que toi, que toi dans le ciel,\nJe ne désire rien d'autre que toi sur la terre.\nSi je suis faible ou même si je tombe,\nDieu est le soutien de mon cœur." },
    { type:"refrain", label:"Refrain", lines:"Dieu, tu es le soutien de mon cœur,\nMon héritage et mon plus grand bien.\nOh oui, Dieu, tu es le soutien de mon cœur,\nPrès de toi je me sens bien." },
    { type:"strophe", label:"Strophe 2", lines:"Quand mon cœur était plein d'amertume,\nJe perdais la raison et je n'y voyais plus rien,\nMais Dieu s'approcha pour me saisir la main,\nDieu est le soutien de mon cœur." }
  ]},
  { title: "Tu es le chant", ref: "Tabitha", sections: [
    { type:"strophe", label:"Strophe", lines:"Seigneur, tu es la force,\nL'amour qui brûle en moi\nComme une flamme,\nLe soutien de mon âme.\nSeigneur, tu es la joie\nQui brille sur mon visage,\nTu es ma gloire,\nTu es tout pour moi.\nEt quand je contemple\nLa grandeur de ton amour,\nMon être entier veut t'adorer." },
    { type:"refrain", label:"Refrain", lines:"Tu es le chant que je chante,\nTu es la mélodie de mon cœur,\nÀ jamais le sujet de mes louanges.\nTu es le chant que je chante,\nTu es la mélodie de mon cœur,\nÀ jamais le sujet de mes louanges." }
  ]},
  { title: "Comme un phare", ref: "JEM2-391 · David Durham", sections: [
    { type:"strophe", label:"Strophe 1", lines:"Sans ta lumière, Seigneur,\nQue ferions-nous dans ce monde ?\nPerdus au large, dans le brouillard,\nAu gré des vents.\nSans ta lumière, Seigneur,\nOù irions-nous dans ce monde ?\nLa mer est immense sans ta présence,\nQue ferions-nous ?" },
    { type:"refrain", label:"Refrain", lines:"Comme un phare dans la nuit,\nTu brilles sur tes enfants,\nTu nous guides vers le port,\nAu cœur de ton amour." },
    { type:"strophe", label:"Strophe 2", lines:"Sans ta lumière, Seigneur,\nQue serions-nous dans ce monde ?\nEn perdition, sans direction,\nCherchant la voie.\nSans ta lumière, Seigneur,\nOù irions-nous dans ce monde ?\nQue décider ? Qui écouter ?\nQue ferions-nous ?" }
  ]},
  { title: "Je continuerai", ref: "JEM2-530 · David Durham", sections: [
    { type:"strophe", label:"Strophe 1", lines:"Dans ce désert de lassitude,\nOù mes pas m'ont amené,\nQuelque part, où ? Je ne sais.\nJ'ai dû lâcher ta main.\nDans ce silence, je veux me taire\nEt retrouver ta voix." },
    { type:"refrain", label:"Refrain", lines:"Je continuerai à t'adorer,\nCar tu m'as aimé le premier.\nMalgré mes doutes et mes questions,\nTu restes le même.\nJe continuerai à te louer,\nÀ compter sur ta fidélité.\nDans le désert ou l'abondance,\nTu m'accompagnes." },
    { type:"strophe", label:"Strophe 2", lines:"Dans ma détresse, ma solitude,\nJe sais que tu es resté ;\nCe n'est pas toi qui m'as laissé,\nJe voudrais revenir.\nDans ce silence, je veux me taire\nEt retrouver ta voix." }
  ]},
  { title: "Ouvre les yeux de mon cœur", ref: "JEM2-694 · Paul Baloche", sections: [
    { type:"refrain", label:"Refrain", lines:"Ouvre les yeux de mon cœur,\nOuvre les yeux de mon cœur,\nJe désire te voir, je désire te voir.\nOuvre les yeux de mon cœur,\nOuvre les yeux de mon cœur,\nJe désire te voir, je désire te voir." },
    { type:"strophe", label:"Strophe", lines:"Élevé au plus haut des cieux,\nRayonnant de l'éclat de ta gloire,\nRépands ton amour, ta force,\nAlors que nous chantons : « Tu es saint. »" },
    { type:"pont", label:"Pont", lines:"Tu es saint, tu es saint,\nTu es saint, tu es saint,\nTu es saint, tu es saint,\nJe désire te voir." }
  ]},
  { title: "Dieu a une armée", ref: "JEM2-398 · Corinne Lafitte", sections: [
    { type:"strophe", label:"Strophe 1", lines:"Dieu a une armée qui se lève\nPour lui obéir.\nDieu a une armée qui se lève\nPour le servir." },
    { type:"refrain", label:"Refrain", lines:"Peuple de Dieu, lève tes mains\nPour l'adorer ;\nPeuple de Dieu, ouvre ta bouche ;\nDieu veut parler." },
    { type:"strophe", label:"Strophe 2", lines:"C'est l'Esprit de Dieu qui la mène,\nQui mène ses pas.\nC'est l'Esprit de Dieu qui l'entraîne,\nL'entraîne au combat." },
    { type:"strophe", label:"Strophe 3", lines:"À l'Agneau de Dieu soit la gloire\nDans les lieux très hauts.\nÀ l'Agneau de Dieu la victoire,\nVive notre héros !" }
  ]},
  { title: "Emmanuel", ref: "Exo", sections: [
    { type:"refrain", label:"Refrain", lines:"Reçois l'adoration,\nTu es le Roi de gloire,\nNotre victoire,\nDigne es-tu, Seigneur,\nEmmanuel." },
    { type:"strophe", label:"Strophe 1", lines:"Dieu de lumière, élevé dans les cieux,\nRempli de grâce et de paix,\nEnvironné de louange et de feu,\nGardien de l'éternité.\nPourquoi quitter ce palais de bonheur\nPour un sentier de misère ?\nPar quel amour les chemins de ton cœur\nOnt-ils su trouver nos prières ?" },
    { type:"strophe", label:"Couplet", lines:"De cette foi que ton cœur a montrée\nJe veux puiser mon secours.\nSur le chemin que ta vie a tracé\nJe marcherai chaque jour.\nGarde mes yeux des attraits de ce monde,\nGarde-moi près de la croix.\nEn ce lieu saint où mon âme est féconde\nD'humilité et de joie." }
  ]},
  { title: "Je veux n'être qu'à toi", ref: "Exo", sections: [
    { type:"strophe", label:"Strophe 1", lines:"Reçois de moi le parfum qui t'est dû,\nLa beauté de ton nom\nEn mon âme éperdue.\nJe veux n'être qu'à toi. Jésus, je t'aime." },
    { type:"strophe", label:"Strophe 2", lines:"Reçois du peu que je trouve à donner,\nTout l'amour que mes yeux\nN'ont pas su te montrer.\nJe veux n'être qu'à toi. Jésus, je t'aime." },
    { type:"refrain", label:"Refrain", lines:"Rien n'est plus beau que ton nom.\nRien n'est plus saint que le sang du pardon.\nJe veux n'être qu'à toi, Jésus mon Roi." },
    { type:"strophe", label:"Strophe 3", lines:"Je ne veux rien que vouloir te louer,\nAdorer ton saint nom et ta fidélité.\nJe veux n'être qu'à toi. Jésus, je t'aime." },
    { type:"strophe", label:"Strophe 4", lines:"Je veux porter et laver à ta croix\nLes pensées de mon cœur\nDans le cœur de tes voies.\nJe veux n'être qu'à toi. Jésus, je t'aime." }
  ]},
  { title: "La bonté de Dieu", ref: "Bethel Music · Jenn Johnson", sections: [
    { type:"strophe", label:"Strophe 1", lines:"Je t'aime, Seigneur,\nTa bonté ne faillit jamais.\nTous les jours\nTu me tiens dans tes mains.\nDès que je me réveille\nJusqu'à mon coucher,\nJe chanterai la bonté de Dieu." },
    { type:"refrain", label:"Refrain", lines:"Toute ma vie tu as été bon,\nToute ma vie tu as été fidèle.\nAvec le souffle qui est en moi\nJe chanterai la bonté de Dieu." },
    { type:"strophe", label:"Strophe 2", lines:"J'aime ta voix,\nTu me conduis dans les épreuves.\nDans les ténèbres,\nTu restes auprès de moi.\nJe te connais comme mon Père\nEt comme un ami,\nEt j'ai vécu dans la bonté de Dieu." },
    { type:"pont", label:"Pont", lines:"Ta bonté court après, court après moi.\nJe te donne ma vie, j'abandonne tout,\nJe me soumets à toi.\nTa bonté court après, court après moi." }
  ]}
];

const pageList = [];
pageList.push({ type: 'cover' });
pageList.push({ type: 'index' });
songs.forEach((song, i) => pageList.push({ type: 'song', song, num: i + 1 }));

const pages = [];
let currentPage = 0, isAnimating = false;

function buildPages() {
  const book = document.getElementById('book');
  book.innerHTML = '';
  pageList.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'page'; el.dataset.index = i;
    if (p.type === 'cover') {
      el.classList.add('cover');
      el.innerHTML = `<div class="page-inner">
        <div class="cover-circle" style="width:200px;height:200px;top:-55px;right:-55px;"></div>
        <div class="cover-circle" style="width:320px;height:320px;top:-110px;right:-110px;"></div>
        <div class="cover-ornament">🕊️</div>
        <div class="cover-brand">Youth Alive · Jeunesse Adventiste</div>
        <h1 class="cover-main-title">Soirée de<span class="cover-title-accent">Louange</span></h1>
        <div class="cover-divider"></div>
        <p class="cover-verse">« Chantez à l'Éternel un cantique nouveau,<br>chantez à l'Éternel, vous tous,<br>habitants de la terre ! »<cite>Psaume 96 : 1</cite></p>
        <div class="cover-count">${songs.length} chants · Gloire à Dieu</div>
      </div>`;
    } else if (p.type === 'index') {
      el.classList.add('index-page');
      const items = songs.map((s, idx) => `
        <div class="index-item" onclick="goToSong(${idx+2})">
          <span class="index-num">${idx+1}</span>
          <div class="index-song-name">${s.title}</div>
          <div class="index-ref">${s.ref}</div>
        </div>`).join('');
      el.innerHTML = `<div class="page-inner"><div class="index-header"><div class="eyebrow">Programme</div><div class="index-main-title">Table des matières</div></div><div class="index-list">${items}</div></div>`;
    } else {
      el.classList.add('song-page');
      const s = p.song;
      const sHTML = s.sections.map(sec => {
        let cls = 'lyric-lines';
        if (sec.type==='refrain') cls += ' refrain';
        if (sec.type==='pont') cls += ' pont';
        return `<div class="lyric-section"><div class="section-label">${sec.label}</div><div class="${cls}">${sec.lines.split('\n').join('<br>')}</div></div>`;
      }).join('');
      el.innerHTML = `<div class="page-inner"><div class="page-header"><div class="song-counter">Chant ${p.num} sur ${songs.length}</div><div class="song-title">${s.title}</div><div class="song-meta">${s.ref}</div></div><div class="lyrics-scroll">${sHTML}</div></div>`;
    }
    book.appendChild(el); pages.push(el);
  });
  renderPage(); buildDots();
}

function buildDots() {
  const c = document.getElementById('dots'); c.innerHTML = '';
  for (let i = 0; i < Math.min(pageList.length, 11); i++) { const d = document.createElement('div'); d.className = 'dot'; c.appendChild(d); }
}

function renderPage() {
  pages.forEach((el, i) => {
    if (i === currentPage) { el.style.display=''; el.style.zIndex='5'; }
    else if (i === currentPage+1) { el.style.display=''; el.style.zIndex='3'; }
    else el.style.display='none';
  });
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage === pageList.length-1;
  const dots = document.querySelectorAll('.dot'), dc = dots.length, total = pageList.length;
  let start = Math.max(0, Math.min(currentPage - Math.floor(dc/2), total-dc));
  dots.forEach((d,i) => d.classList.toggle('active', start+i===currentPage));
  const p = pageList[currentPage];
  document.getElementById('pageLabel').textContent = p.type==='cover'?'Couverture':p.type==='index'?'Sommaire':p.song.title;
}

function goToSong(idx) { if(idx>=0&&idx<pageList.length){currentPage=idx;renderPage();flash();} }

function turnPage(dir) {
  if (isAnimating) return;
  const next = currentPage+dir;
  if (next<0||next>=pageList.length) return;
  isAnimating = true;
  const cur=pages[currentPage], tgt=pages[next];
  tgt.style.display=''; tgt.style.zIndex=dir>0?'4':'6';
  if (dir>0) {
    cur.style.cssText='transition:transform .4s ease,opacity .4s;transform:translateX(-10px) scale(.985);opacity:0';
    tgt.style.cssText='opacity:0;transform:translateX(14px)';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ tgt.style.cssText='transition:transform .4s ease,opacity .4s;transform:translateX(0);opacity:1'; }));
  } else {
    cur.style.cssText='transition:transform .36s ease,opacity .36s;transform:translateX(10px) scale(.985);opacity:0';
    tgt.style.cssText='opacity:0;transform:translateX(-10px)';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ tgt.style.cssText='transition:transform .36s ease,opacity .36s;transform:translateX(0);opacity:1'; }));
  }
  flash();
  setTimeout(()=>{ cur.style.cssText=''; tgt.style.cssText=''; currentPage=next; renderPage(); isAnimating=false; }, 420);
}

function flash() { const o=document.getElementById('overlay'); o.classList.add('flash'); setTimeout(()=>o.classList.remove('flash'),200); }

let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40)turnPage(dx<0?1:-1);},{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')turnPage(1);if(e.key==='ArrowLeft'||e.key==='ArrowUp')turnPage(-1);});
setTimeout(()=>{const h=document.getElementById('swipeHint');if(h)h.remove();},4500);
buildPages();
</script>
</body>
</html>
